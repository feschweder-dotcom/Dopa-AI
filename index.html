<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Dopa-AI</title>
  <meta name="description" content="Track habits, build discipline, and improve daily focus" />
  <meta name="theme-color" content="#000000" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; }
    body { font-family: 'IBM Plex Mono', monospace; background: #000; color: #fff; }
    #root { min-height: 100vh; }
    input, button, select, textarea { font-family: inherit; }
    button { cursor: pointer; border: none; background: none; }
    input:focus { outline: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const DEFAULT_DOPAMINE = 5;
const MIN_DOPA = 1;
const MAX_DOPA = 100;
const STORAGE_KEY = 'dopaai_v1';
const CATEGORIES = [
  { name: 'productive', delta: -10, words: ['work','working','study','studying','learn','learning','code','coding','program','programming','job','office','school','homework'] },
  { name: 'physical', delta: -15, words: ['gym','workout','jog','jogging','run','running','exercise','fitness','pushups','situps','walk','walking','cycling','bike'] },
  { name: 'mindful', delta: -12, words: ['meditate','meditation','breathing','breathwork','cold shower','stretch','stretching','yoga','journal','journaling'] },
  { name: 'neutral', delta: -4, words: ['clean','cleaning','cook','cooking','dishes','laundry','shopping','groceries','shower','hygiene','commute'] },
  { name: 'low_entertain', delta: +5, words: ['music','podcast','youtube','documentary','read fiction','novel'] },
  { name: 'high_entertain', delta: +12, words: ['shorts','tiktok','reels','instagram','netflix','youtube shorts','series','tv','movie'] },
  { name: 'very_high', delta: +20, words: ['porn','masturbation','sex','gaming','video games','gambling','junk food','sugar','sweets','fast food'] },
];
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function matchActivity(text) {
  const lower = text.toLowerCase();
  for (const cat of CATEGORIES) {
    for (const word of cat.words) {
      if (lower.includes(word)) return cat.delta;
    }
  }
  return +3;
}
function getCategoryLabel(delta) {
  if (delta <= -12) return 'DISCIPLINE';
  if (delta <= -4) return 'PRODUCTIVE';
  if (delta <= 5) return 'NEUTRAL';
  if (delta <= 12) return 'ENTERTAINMENT';
  return 'HIGH STIM';
}
function loadStorage() {
  try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; } catch { return null; }
}
function saveStorage(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }
function initData() {
  return { dopamine: DEFAULT_DOPAMINE, lastResetDate: todayStr(), activities: [], flames: 0, targetMin: 20, targetMax: 40, lastFlameCheck: todayStr(), theme: 'dark' };
}
function hydrateData() {
  let d = loadStorage();
  if (!d) d = initData();
  const today = todayStr();
  if (d.lastResetDate !== today) {
    const prevActivities = (d.activities || []).filter(a => a.date === d.lastResetDate);
    if (prevActivities.length > 0) {
      const avg = prevActivities.reduce((s, a) => s + a.resultingDopamine, 0) / prevActivities.length;
      if (avg >= d.targetMin && avg <= d.targetMax) { d.flames = (d.flames || 0) + 1; } else { d.flames = 0; }
    }
    d.dopamine = DEFAULT_DOPAMINE;
    d.lastResetDate = today;
    saveStorage(d);
  }
  return d;
}
function getTheme(isDark) {
  return {
    bg: isDark ? '#000000' : '#ffffff', bg2: isDark ? '#0d0d0d' : '#f5f5f5', bg3: isDark ? '#1a1a1a' : '#ebebeb',
    border: isDark ? '#222222' : '#dddddd', text: isDark ? '#ffffff' : '#000000', sub: isDark ? '#666666' : '#999999',
    accent: isDark ? '#ffffff' : '#000000', accent2: isDark ? '#ff4444' : '#ff2222',
    positive: isDark ? '#44ff88' : '#00aa44', negative: isDark ? '#4488ff' : '#0044cc', neutral: isDark ? '#aaaaaa' : '#555555',
  };
}
function IconHome({ size=22, color }) { return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>; }
function IconList({ size=22, color }) { return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>; }
function IconCalendar({ size=22, color }) { return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>; }
function IconSettings({ size=22, color }) { return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>; }
function BottomNav({ screen, setScreen, t }) {
  const tabs = [{ id:'home', label:'HOME', Icon:IconHome },{ id:'history', label:'LOG', Icon:IconList },{ id:'calendar', label:'CALENDAR', Icon:IconCalendar },{ id:'settings', label:'SETTINGS', Icon:IconSettings }];
  return <div style={{ position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)', width:'100%', maxWidth:'430px', backgroundColor:t.bg, borderTop:`1px solid ${t.border}`, display:'flex', zIndex:100 }}>
    {tabs.map(({ id, label, Icon }) => { const active = screen===id; return <button key={id} onClick={() => setScreen(id)} style={{ flex:1, padding:'12px 0', display:'flex', flexDirection:'column', alignItems:'center', gap:'4px', color:active?t.text:t.sub, backgroundColor:'transparent' }}><Icon size={20} color={active?t.text:t.sub}/><span style={{ fontSize:'9px', letterSpacing:'0.08em', fontWeight:active?'600':'400' }}>{label}</span></button>; })}
  </div>;
}
function DopaGauge({ value, t }) {
  const pct = ((value-MIN_DOPA)/(MAX_DOPA-MIN_DOPA))*100;
  const color = value<=30?t.negative:value<=60?t.text:t.accent2;
  return <div style={{ width:'100%', marginBottom:'8px' }}><div style={{ height:'3px', backgroundColor:t.bg3, borderRadius:'2px', overflow:'hidden' }}><div style={{ height:'100%', width:`${pct}%`, backgroundColor:color, transition:'width 0.4s ease' }}/></div></div>;
}
function HomeScreen({ data, setData, saveData, t, installPrompt, setInstallPrompt }) {
  const [text, setText] = useState('');
  const [mins, setMins] = useState('');
  const [flash, setFlash] = useState(null);
  function handleAdd() {
    const trimmed = text.trim();
    if (!trimmed) return;
    const m = parseFloat(mins)||30;
    const baseDelta = matchActivity(trimmed);
    const durationFactor = Math.min(m/30,2.0);
    const finalDelta = Math.round(baseDelta*durationFactor*10)/10;
    const newDopa = clamp(Math.round((data.dopamine+finalDelta)*10)/10,MIN_DOPA,MAX_DOPA);
    const entry = { id:Date.now(), activityText:trimmed, durationMinutes:m, baseDelta, finalDelta, resultingDopamine:newDopa, timestamp:new Date().toISOString(), date:todayStr() };
    const newData = { ...data, dopamine:newDopa, activities:[...data.activities,entry] };
    setData(newData); saveData(newData); setText(''); setMins('');
    setFlash(finalDelta); setTimeout(()=>setFlash(null),1500);
  }
  function handleInstall() { if (installPrompt) { installPrompt.prompt(); installPrompt.userChoice.then(()=>setInstallPrompt(null)); } }
  const todayCount = data.activities.filter(a=>a.date===todayStr()).length;
  const dopaColor = data.dopamine<=30?t.negative:data.dopamine<=60?t.text:t.accent2;
  return <div style={{ padding:'0 24px', paddingTop:'20px' }}>
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'40px' }}>
      <div style={{ display:'flex', alignItems:'center', gap:'6px' }}><span style={{ fontSize:'20px' }}>🔥</span><span style={{ fontSize:'22px', fontWeight:'700' }}>{data.flames}</span></div>
      <span style={{ fontSize:'11px', color:t.sub, letterSpacing:'0.1em' }}>DOPA-AI</span>
      <div style={{ width:'48px' }}/>
    </div>
    <div style={{ textAlign:'center', marginBottom:'32px' }}>
      <div style={{ fontSize:'11px', letterSpacing:'0.15em', color:t.sub, marginBottom:'8px' }}>CURRENT DOPAMINE</div>
      <div style={{ fontSize:'96px', fontWeight:'700', lineHeight:1, color:dopaColor, position:'relative', display:'inline-block' }}>
        {Math.round(data.dopamine)}
        {flash!==null && <span style={{ position:'absolute', top:'8px', right:'-40px', fontSize:'20px', fontWeight:'600', color:flash<0?t.negative:t.accent2 }}>{flash>0?'+':''}{Math.round(flash)}</span>}
      </div>
      <div style={{ marginTop:'16px' }}>
        <DopaGauge value={data.dopamine} t={t}/>
        <div style={{ display:'flex', justifyContent:'space-between', fontSize:'10px', color:t.sub }}><span>{MIN_DOPA}</span><span>TARGET {data.targetMin}–{data.targetMax}</span><span>{MAX_DOPA}</span></div>
      </div>
      <div style={{ marginTop:'8px', fontSize:'11px', color:t.sub }}>{todayCount} {todayCount===1?'activity':'activities'} today</div>
    </div>
    <div style={{ height:'1px', backgroundColor:t.border, marginBottom:'28px' }}/>
    <div style={{ display:'flex', flexDirection:'column', gap:'12px' }}>
      <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleAdd()} placeholder="What did you just do?" style={{ backgroundColor:t.bg3, border:`1px solid ${t.border}`, color:t.text, padding:'14px 16px', fontSize:'14px', borderRadius:'4px', width:'100%' }}/>
      <div style={{ display:'flex', gap:'10px' }}>
        <input value={mins} onChange={e=>setMins(e.target.value)} type="number" placeholder="Minutes" min="1" style={{ backgroundColor:t.bg3, border:`1px solid ${t.border}`, color:t.text, padding:'14px 16px', fontSize:'14px', borderRadius:'4px', width:'120px' }}/>
        <button onClick={handleAdd} style={{ flex:1, backgroundColor:t.text, color:t.bg, padding:'14px 20px', fontSize:'13px', fontWeight:'700', letterSpacing:'0.1em', borderRadius:'4px', fontFamily:'inherit' }}>ADD ACTIVITY</button>
      </div>
    </div>
    {installPrompt && <button onClick={handleInstall} style={{ marginTop:'24px', width:'100%', padding:'14px', border:`1px solid ${t.border}`, backgroundColor:'transparent', color:t.text, fontSize:'13px', fontWeight:'600', letterSpacing:'0.1em', borderRadius:'4px', fontFamily:'inherit' }}>↓ INSTALL APP</button>}
    {data.activities.filter(a=>a.date===todayStr()).slice(-3).reverse().map(a=>(
      <div key={a.id} style={{ marginTop:'12px', padding:'12px 14px', backgroundColor:t.bg2, borderRadius:'4px', border:`1px solid ${t.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div><div style={{ fontSize:'13px', fontWeight:'500' }}>{a.activityText}</div><div style={{ fontSize:'11px', color:t.sub, marginTop:'2px' }}>{a.durationMinutes} min · {getCategoryLabel(a.baseDelta)}</div></div>
        <div style={{ fontSize:'16px', fontWeight:'700', color:a.finalDelta<0?t.negative:t.accent2 }}>{a.finalDelta>0?'+':''}{Math.round(a.finalDelta)}</div>
      </div>
    ))}
    <div style={{ height:'100px' }}/>
  </div>;
}
function HistoryScreen({ data, t }) {
  const today = todayStr();
  const [selectedDate, setSelectedDate] = useState(today);
  const dates = [...new Set(data.activities.map(a=>a.date))].sort((a,b)=>b.localeCompare(a));
  const filtered = data.activities.filter(a=>a.date===selectedDate).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  function fmtTime(ts) { const d=new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
  function fmtDate(str) { const d=new Date(str+'T00:00:00'); return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase(); }
  return <div style={{ padding:'20px 24px' }}>
    <div style={{ fontSize:'11px', letterSpacing:'0.15em', color:t.sub, marginBottom:'20px' }}>ACTIVITY LOG</div>
    <div style={{ display:'flex', gap:'8px', overflowX:'auto', paddingBottom:'12px', marginBottom:'20px' }}>
      {dates.length===0 && <div style={{ fontSize:'12px', color:t.sub }}>No activities yet.</div>}
      {dates.map(d=><button key={d} onClick={()=>setSelectedDate(d)} style={{ padding:'6px 14px', borderRadius:'2px', border:`1px solid ${selectedDate===d?t.text:t.border}`, backgroundColor:selectedDate===d?t.text:'transparent', color:selectedDate===d?t.bg:t.sub, fontSize:'10px', letterSpacing:'0.08em', fontWeight:'600', fontFamily:'inherit', whiteSpace:'nowrap', flexShrink:0 }}>{fmtDate(d)}</button>)}
    </div>
    {filtered.length===0 && <div style={{ fontSize:'12px', color:t.sub, textAlign:'center', marginTop:'40px' }}>No activities on this day.</div>}
    {filtered.map(a=>(
      <div key={a.id} style={{ padding:'14px 0', borderBottom:`1px solid ${t.border}`, display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div style={{ flex:1 }}><div style={{ fontSize:'14px', fontWeight:'500', marginBottom:'4px' }}>{a.activityText}</div><div style={{ fontSize:'11px', color:t.sub, display:'flex', gap:'12px' }}><span>{fmtTime(a.timestamp)}</span><span>{a.durationMinutes} MIN</span><span>{getCategoryLabel(a.baseDelta)}</span></div></div>
        <div style={{ textAlign:'right', marginLeft:'12px' }}><div style={{ fontSize:'18px', fontWeight:'700', color:a.finalDelta<0?t.negative:t.accent2 }}>{a.finalDelta>0?'+':''}{Math.round(a.finalDelta)}</div><div style={{ fontSize:'11px', color:t.sub }}>→ {Math.round(a.resultingDopamine)}</div></div>
      </div>
    ))}
    <div style={{ height:'100px' }}/>
  </div>;
}
function CalendarScreen({ data, t }) {
  const [viewDate, setViewDate] = useState(new Date());
  const [selectedDay, setSelectedDay] = useState(null);
  const year=viewDate.getFullYear(), month=viewDate.getMonth();
  const daysInMonth=new Date(year,month+1,0).getDate(), firstDay=new Date(year,month,1).getDay();
  function getDayData(day) {
    const str=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const acts=data.activities.filter(a=>a.date===str);
    if (!acts.length) return null;
    const avg=acts.reduce((s,a)=>s+a.resultingDopamine,0)/acts.length;
    return { avg, inRange:avg>=data.targetMin&&avg<=data.targetMax, acts, count:acts.length };
  }
  const MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const DAYS=['SU','MO','TU','WE','TH','FR','SA'];
  const selectedStr=selectedDay?`${year}-${String(month+1).padStart(2,'0')}-${String(selectedDay).padStart(2,'0')}`:null;
  const selectedActs=selectedStr?data.activities.filter(a=>a.date===selectedStr).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)):[];
  function fmtTime(ts) { const d=new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
  return <div style={{ padding:'20px 24px' }}>
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px' }}>
      <button onClick={()=>setViewDate(new Date(year,month-1,1))} style={{ color:t.text, fontSize:'18px', padding:'4px 8px', fontFamily:'inherit' }}>‹</button>
      <span style={{ fontSize:'13px', fontWeight:'700', letterSpacing:'0.15em' }}>{MONTHS[month]} {year}</span>
      <button onClick={()=>setViewDate(new Date(year,month+1,1))} style={{ color:t.text, fontSize:'18px', padding:'4px 8px', fontFamily:'inherit' }}>›</button>
    </div>
    <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', marginBottom:'8px' }}>
      {DAYS.map(d=><div key={d} style={{ textAlign:'center', fontSize:'10px', color:t.sub, padding:'4px 0' }}>{d}</div>)}
    </div>
    <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:'4px', marginBottom:'24px' }}>
      {Array(firstDay).fill(null).map((_,i)=><div key={`e${i}`}/>)}
      {Array(daysInMonth).fill(null).map((_,i)=>{
        const day=i+1, dd=getDayData(day), isSelected=selectedDay===day;
        const today=new Date(), isToday=today.getDate()===day&&today.getMonth()===month&&today.getFullYear()===year;
        return <button key={day} onClick={()=>setSelectedDay(isSelected?null:day)} style={{ aspectRatio:'1', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', borderRadius:'4px', border:isSelected?`1px solid ${t.text}`:isToday?`1px solid ${t.sub}`:'1px solid transparent', backgroundColor:dd?(dd.inRange?(t.bg==='#000000'?'#001a0a':'#e8f5e9'):(t.bg==='#000000'?'#1a0000':'#ffeaea')):t.bg2, cursor:'pointer', fontFamily:'inherit', gap:'2px' }}>
          <span style={{ fontSize:'12px', color:t.text, fontWeight:isToday?'700':'400' }}>{day}</span>
          {dd&&<div style={{ width:'4px', height:'4px', borderRadius:'50%', backgroundColor:dd.inRange?t.positive:t.accent2 }}/>}
        </button>;
      })}
    </div>
    {selectedDay&&<div>
      <div style={{ fontSize:'11px', letterSpacing:'0.15em', color:t.sub, marginBottom:'12px' }}>{MONTHS[month]} {selectedDay} — {selectedActs.length} ACTIVITIES</div>
      {selectedActs.length===0&&<div style={{ fontSize:'12px', color:t.sub, textAlign:'center', padding:'20px 0' }}>No data for this day.</div>}
      {selectedActs.map(a=><div key={a.id} style={{ padding:'12px 0', borderBottom:`1px solid ${t.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div><div style={{ fontSize:'13px', fontWeight:'500' }}>{a.activityText}</div><div style={{ fontSize:'11px', color:t.sub, marginTop:'2px' }}>{fmtTime(a.timestamp)} · {a.durationMinutes} min</div></div>
        <div style={{ fontSize:'16px', fontWeight:'700', color:a.finalDelta<0?t.negative:t.accent2 }}>{a.finalDelta>0?'+':''}{Math.round(a.finalDelta)}</div>
      </div>)}
    </div>}
    <div style={{ height:'100px' }}/>
  </div>;
}
function SettingsScreen({ data, setData, saveData, t }) {
  const [minVal, setMinVal] = useState(String(data.targetMin));
  const [maxVal, setMaxVal] = useState(String(data.targetMax));
  const [saved, setSaved] = useState(false);
  function saveTarget() { const mn=parseInt(minVal),mx=parseInt(maxVal); if(isNaN(mn)||isNaN(mx)||mn>=mx||mn<1||mx>100)return; const newData={...data,targetMin:mn,targetMax:mx}; setData(newData); saveData(newData); setSaved(true); setTimeout(()=>setSaved(false),1500); }
  function toggleTheme() { const newData={...data,theme:data.theme==='dark'?'light':'dark'}; setData(newData); saveData(newData); }
  function resetDopa() { if(!confirm('Reset current dopamine to 5?'))return; const newData={...data,dopamine:DEFAULT_DOPAMINE}; setData(newData); saveData(newData); }
  function resetFlames() { if(!confirm('Reset flame streak to 0?'))return; const newData={...data,flames:0}; setData(newData); saveData(newData); }
  return <div style={{ padding:'20px 24px' }}>
    <div style={{ fontSize:'11px', letterSpacing:'0.15em', color:t.sub, marginBottom:'28px' }}>SETTINGS</div>
    <div style={{ fontSize:'10px', letterSpacing:'0.15em', color:t.sub, marginBottom:'12px' }}>DOPAMINE TARGET RANGE</div>
    <div style={{ display:'flex', gap:'10px', alignItems:'center', marginBottom:'10px' }}>
      <input value={minVal} onChange={e=>setMinVal(e.target.value)} type="number" placeholder="Min" style={{ backgroundColor:t.bg3, border:`1px solid ${t.border}`, color:t.text, padding:'10px 14px', fontSize:'14px', borderRadius:'4px', width:'80px', fontFamily:'inherit' }}/>
      <span style={{ color:t.sub }}>—</span>
      <input value={maxVal} onChange={e=>setMaxVal(e.target.value)} type="number" placeholder="Max" style={{ backgroundColor:t.bg3, border:`1px solid ${t.border}`, color:t.text, padding:'10px 14px', fontSize:'14px', borderRadius:'4px', width:'80px', fontFamily:'inherit' }}/>
      <button onClick={saveTarget} style={{ flex:1, padding:'10px', backgroundColor:t.text, color:t.bg, fontSize:'12px', fontWeight:'700', letterSpacing:'0.08em', borderRadius:'4px', fontFamily:'inherit' }}>{saved?'✓ SAVED':'SAVE'}</button>
    </div>
    <div style={{ fontSize:'11px', color:t.sub, marginBottom:'32px' }}>Stay within this range daily to earn a 🔥 flame.</div>
    <div style={{ fontSize:'10px', letterSpacing:'0.15em', color:t.sub, marginBottom:'12px' }}>APPEARANCE</div>
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 0', borderBottom:`1px solid ${t.border}`, marginBottom:'32px' }}>
      <span style={{ fontSize:'13px' }}>Theme</span>
      <button onClick={toggleTheme} style={{ padding:'6px 16px', border:`1px solid ${t.border}`, backgroundColor:'transparent', color:t.text, fontSize:'12px', fontWeight:'600', borderRadius:'4px', fontFamily:'inherit' }}>{data.theme==='dark'?'☀ LIGHT':'☾ DARK'}</button>
    </div>
    <div style={{ fontSize:'10px', letterSpacing:'0.15em', color:t.sub, marginBottom:'12px' }}>RESET</div>
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 0', borderBottom:`1px solid ${t.border}` }}>
      <span style={{ fontSize:'13px' }}>Reset dopamine to 5</span>
      <button onClick={resetDopa} style={{ padding:'6px 16px', border:`1px solid ${t.border}`, backgroundColor:'transparent', color:t.accent2, fontSize:'12px', fontWeight:'600', borderRadius:'4px', fontFamily:'inherit' }}>RESET</button>
    </div>
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 0', borderBottom:`1px solid ${t.border}`, marginBottom:'32px' }}>
      <span style={{ fontSize:'13px' }}>Reset flame streak</span>
      <button onClick={resetFlames} style={{ padding:'6px 16px', border:`1px solid ${t.border}`, backgroundColor:'transparent', color:t.accent2, fontSize:'12px', fontWeight:'600', borderRadius:'4px', fontFamily:'inherit' }}>RESET</button>
    </div>
    <div style={{ padding:'16px', backgroundColor:t.bg2, borderRadius:'4px', border:`1px solid ${t.border}`, fontSize:'12px', lineHeight:'1.6', color:t.sub, marginBottom:'16px' }}>
      <div style={{ fontWeight:'700', color:t.text, marginBottom:'8px', fontSize:'13px' }}>Dopa-AI v1.0</div>
      <div>A symbolic self-control tracker. Not a medical or scientific dopamine measurement tool.</div>
      <div style={{ marginTop:'8px' }}>All data stored locally on your device. No login. No cloud sync.</div>
    </div>
    <div style={{ padding:'16px', backgroundColor:t.bg2, borderRadius:'4px', border:`1px solid ${t.border}`, fontSize:'12px', lineHeight:'1.6', color:t.sub }}>
      This app does not collect, transmit, or store any data outside your device. All activity logs are stored in your browser's local storage and never leave your device.
    </div>
    <div style={{ height:'100px' }}/>
  </div>;
}
function App() {
  const [data, setData] = useState(()=>hydrateData());
  const [screen, setScreen] = useState('home');
  const [installPrompt, setInstallPrompt] = useState(null);
  const t = getTheme(data.theme==='dark');
  function save(d) { saveStorage(d); }
  useEffect(()=>{ const handler=e=>{e.preventDefault();setInstallPrompt(e);}; window.addEventListener('beforeinstallprompt',handler); return ()=>window.removeEventListener('beforeinstallprompt',handler); },[]);
  useEffect(()=>{ const interval=setInterval(()=>{ const today=todayStr(); setData(prev=>{ if(prev.lastResetDate!==today){const newData={...prev,dopamine:DEFAULT_DOPAMINE,lastResetDate:today};saveStorage(newData);return newData;} return prev; }); },60000); return ()=>clearInterval(interval); },[]);
  return <div style={{ backgroundColor:t.bg, color:t.text, minHeight:'100vh', maxWidth:'430px', margin:'0 auto', position:'relative', fontFamily:"'IBM Plex Mono', monospace" }}>
    {screen==='home'&&<HomeScreen data={data} setData={setData} saveData={save} t={t} installPrompt={installPrompt} setInstallPrompt={setInstallPrompt}/>}
    {screen==='history'&&<HistoryScreen data={data} t={t}/>}
    {screen==='calendar'&&<CalendarScreen data={data} t={t}/>}
    {screen==='settings'&&<SettingsScreen data={data} setData={setData} saveData={save} t={t}/>}
    <BottomNav screen={screen} setScreen={setScreen} t={t}/>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
