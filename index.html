const { useState, useEffect } = React;
const STORAGE_KEY = 'dopaai_v2';
const DEFAULT_DOPA = 5;
const CATEGORIES = [
  { delta: -7, words: ['work','working','study','studying','learn','learning','code','coding','programming','read','reading','chess','job','office','write','writing','practice','practicing','build','building','design','designing','plan','planning','draw','drawing','research','researching','type','typing','create','creating','train','training','school','blogging','filming','editing','recording','producing','composing','investing','networking','mentoring','coaching','tutoring','freelancing','selling','marketing','strategizing','analyzing','budgeting','scheduling','presenting','homework'] },
  { delta: -9, words: ['gym','workout','jog','jogging','run','running','exercise','fitness','pushups','situps','walk','walking','cycling','swim','swimming','hike','hiking','climb','climbing','skate','skating','dance','dancing','jump','jumping','lift','lifting','sprint','sprinting','row','rowing','box','boxing','football','soccer','basketball','tennis','volleyball','badminton','baseball','rugby','hockey','golf','martial arts','karate','boxing','wrestling','surfing','skiing','snowboarding','skateboarding','parkour','crossfit','bike'] },
  { delta: -10, words: ['meditate','meditation','breathing','breathwork','cold shower','stretch','stretching','yoga','journal','rest','relax','relaxing','pray','praying','sauna','bath','bathing','gratitude','reflect','reflecting','nap','napping','unplug','unplugging','silence','contemplate','visualize','visualizing','mindfulness','stretching','foam rolling','ice bath','cold plunge','fasting','intermittent fasting','walking in nature','hiking alone','praying','gratitude journal','affirmations','visualization','deep breathing','body scan','digital detox','journaling'] },
  { delta:  -4, words: ['clean','cleaning','cook','cooking','dishes','laundry','shopping','groceries','shower','hygiene','drive','driving','eat','eating','wait','waiting','chat','chatting','talk','talking','meet','meeting','travel','traveling','pack','packing','organize','organizing','prepare','preparing','grocery run','car wash','haircut','dentist','appointment','errand','dog walk','pet care','watering plants','tidying','decluttering','packing lunch','meal prep','ironing','vacuuming','commute'] },
  { delta:  +3, words: ['music','podcast','youtube','documentary','audiobook','news','junk food','sugar','sweets','puzzle','paint','painting','sketch','sketching','photography','craft','crafting','board game','knit','knitting','crossword','sudoku','listen','listening','read fiction','novel'] },
  { delta: +20, words: ['shorts','tiktok','reels','gaming','video games','instagram','netflix','snack','snacking','series','tv','scroll','scrolling','browsing','snapchat','twitter','facebook','energy drink','chips','candy','chocolate','fast food','takeaway','burger','pizza','soda','stream','streaming','twitch','reddit','memes','pinterest','whatsapp','texting','tinder','bumble','explore','feed','stories','clips','movie'] },
  { delta: +21, words: ['porn','masturbation','gooning','sex','gambling','binge','binging','smoke','smoking','drinking','alcohol','vaping','vape','bet','betting'] },
];
function todayStr() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function clamp(v,lo,hi) { return Math.max(lo,Math.min(hi,v)); }
const LEVELS = [
  {level:1, title:'Civilian', xpNeeded:0},
  {level:2, title:'Beginner', xpNeeded:100},
  {level:3, title:'Focused', xpNeeded:250},
  {level:4, title:'Disciplined', xpNeeded:500},
  {level:5, title:'Warrior', xpNeeded:1000},
  {level:6, title:'Elite', xpNeeded:2000},
  {level:7, title:'Master', xpNeeded:3500},
  {level:8, title:'Legend', xpNeeded:5000},
  {level:9, title:'Monk', xpNeeded:7500},
  {level:10, title:'Entrepreneur', xpNeeded:10000},
];
function getLevel(xp) {
  let current = LEVELS[0];
  for(const l of LEVELS) { if(xp >= l.xpNeeded) current = l; }
  const nextIdx = LEVELS.findIndex(l=>l.level===current.level)+1;
  const next = LEVELS[nextIdx] || null;
  return { ...current, next, xp };
}function matchActivity(text) { const lower=text.toLowerCase(); for(const cat of CATEGORIES) for(const word of cat.words) if(lower.includes(word)) return cat.delta; return +3; }
function load() { try { const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):null; } catch { return null; } }
function save(d) { try { localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); } catch {} }
function initData(profile) { return { profile, dopamine:DEFAULT_DOPA, lastReset:todayStr(), activities:[], flames:0, targetMin:20, targetMax:40, entrepreneurMode:false, xp:0, level:1 }; }
function hydrate() {
  let d=load(); if(!d) return null;
  const today=todayStr();
  if(d.lastReset!==today) {
    const prev=(d.activities||[]).filter(a=>a.date===d.lastReset);
    if(prev.length>0){const avg=prev.reduce((s,a)=>s+a.resultingDopamine,0)/prev.length; d.flames=(avg>=d.targetMin&&avg<=d.targetMax)?(d.flames||0)+1:0;}
    d.dopamine=DEFAULT_DOPA; d.lastReset=today; save(d);
  }
  return d;
}

  );
}
function HistoryScreen({ data }) {
  const [sel, setSel] = useState(todayStr());
  const dates=[...new Set(data.activities.map(a=>a.date))].sort((a,b)=>b.localeCompare(a));
  const acts=data.activities.filter(a=>a.date===sel).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  function fmtTime(ts){const d=new Date(ts);return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
  function fmtDate(str){const d=new Date(str+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();}
  return (
    <div style={{ padding:'28px 24px 120px' }}>
      <div style={{ fontSize:'30px', fontWeight:'800', fontFamily:'Syne, sans-serif', marginBottom:'24px' }}>Log</div>
      <div style={{ display:'flex', gap:'8px', overflowX:'auto', paddingBottom:'16px', marginBottom:'16px' }}>
        {dates.length===0&&<div style={{fontSize:'13px',color:'#555'}}>No activities yet.</div>}
        {dates.map(d=><button key={d} onClick={()=>setSel(d)} style={{ padding:'8px 18px', borderRadius:'20px', flexShrink:0, background:sel===d?'#fff':'#161616', color:sel===d?'#000':'#555', fontSize:'12px', fontWeight:'700', fontFamily:'Syne, sans-serif', border:`1px solid ${sel===d?'#fff':'#252525'}` }}>{fmtDate(d)}</button>)}
      </div>
      {acts.length===0&&<div style={{fontSize:'13px',color:'#555',textAlign:'center',marginTop:'48px'}}>Nothing here.</div>}
      {acts.map(a=>(
        <div key={a.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'17px 0', borderBottom:'1px solid #161616' }}>
          <div>
            <div style={{fontSize:'15px',fontWeight:'500'}}>{a.activityText}</div>
            <div style={{fontSize:'12px',color:'#555',marginTop:'3px'}}>{fmtTime(a.timestamp)} · {a.durationMinutes} min</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:'22px',fontWeight:'800',fontFamily:'Syne, sans-serif',color:a.finalDelta<0?'#4d8fff':'#ff4444'}}>{a.finalDelta>0?'+':''}{Math.round(a.finalDelta)}</div>
            <div style={{fontSize:'11px',color:'#555'}}>→ {Math.round(a.resultingDopamine)}</div>
          </div>
        </div>
      ))}
    </div>
  );
}
function CalendarScreen({ data }) {
  const [view, setView] = useState(new Date());
  const [sel, setSel] = useState(null);
  const year=view.getFullYear(),month=view.getMonth();
  const daysInMonth=new Date(year,month+1,0).getDate(),firstDay=new Date(year,month,1).getDay();
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function getDayData(day){const str=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;const acts=data.activities.filter(a=>a.date===str);if(!acts.length)return null;const avg=acts.reduce((s,a)=>s+a.resultingDopamine,0)/acts.length;return{inRange:avg>=data.targetMin&&avg<=data.targetMax,acts};}
  const selStr=sel?`${year}-${String(month+1).padStart(2,'0')}-${String(sel).padStart(2,'0')}`:null;
  const selActs=selStr?data.activities.filter(a=>a.date===selStr):[];
  function fmtTime(ts){const d=new Date(ts);return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
  return (
    <div style={{ padding:'28px 24px 120px' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'24px' }}>
        <div style={{fontSize:'30px',fontWeight:'800',fontFamily:'Syne, sans-serif'}}>{MONTHS[month]} {year}</div>
        <div style={{display:'flex',gap:'8px'}}>
          <button onClick={()=>setView(new Date(year,month-1,1))} style={{color:'#fff',fontSize:'20px',padding:'6px 12px',background:'#161616',borderRadius:'10px',border:'1px solid #222'}}>‹</button>
          <button onClick={()=>setView(new Date(year,month+1,1))} style={{color:'#fff',fontSize:'20px',padding:'6px 12px',background:'#161616',borderRadius:'10px',border:'1px solid #222'}}>›</button>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:'8px'}}>
        {['S','M','T','W','T','F','S'].map((d,i)=><div key={i} style={{textAlign:'center',fontSize:'11px',color:'#444',padding:'4px 0'}}>{d}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px',marginBottom:'24px'}}>
        {Array(firstDay).fill(null).map((_,i)=><div key={`e${i}`}/>)}
        {Array(daysInMonth).fill(null).map((_,i)=>{
          const day=i+1,dd=getDayData(day),isSel=sel===day;
          const isToday=new Date().getDate()===day&&new Date().getMonth()===month&&new Date().getFullYear()===year;
          return <button key={day} onClick={()=>setSel(isSel?null:day)} style={{aspectRatio:'1',borderRadius:'10px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'3px',background:isSel?'#fff':dd?(dd.inRange?'#0d1f10':'#1f0d0d'):'#141414',border:isToday?'1px solid #444':'1px solid transparent',cursor:'pointer'}}>
            <span style={{fontSize:'13px',fontWeight:isToday?'700':'400',color:isSel?'#000':'#fff'}}>{day}</span>
            {dd&&<div style={{width:'4px',height:'4px',borderRadius:'50%',background:dd.inRange?'#44ff88':'#ff4444'}}/>}
          </button>;
        })}
      </div>
      {sel&&<div>
        <div style={{fontSize:'12px',color:'#555',letterSpacing:'0.1em',fontFamily:'Syne, sans-serif',marginBottom:'12px'}}>{MONTHS[month].toUpperCase()} {sel}</div>
        {selActs.length===0&&<div style={{fontSize:'13px',color:'#555',textAlign:'center',padding:'20px 0'}}>No data.</div>}
        {selActs.map(a=><div key={a.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 0',borderBottom:'1px solid #161616'}}>
          <div><div style={{fontSize:'14px',fontWeight:'500'}}>{a.activityText}</div><div style={{fontSize:'11px',color:'#555',marginTop:'2px'}}>{fmtTime(a.timestamp)} · {a.durationMinutes} min</div></div>
          <div style={{fontSize:'20px',fontWeight:'800',fontFamily:'Syne, sans-serif',color:a.finalDelta<0?'#4d8fff':'#ff4444'}}>{a.finalDelta>0?'+':''}{Math.round(a.finalDelta)}</div>
        </div>)}
      </div>}
    </div>
  );
}
function SettingsScreen({ data, setData }) {
  const [minVal, setMinVal] = useState(String(data.targetMin));
  const [maxVal, setMaxVal] = useState(String(data.targetMax));
  const [saved, setSaved] = useState(false);
  function saveTarget(){const mn=parseInt(minVal),mx=parseInt(maxVal);if(isNaN(mn)||isNaN(mx)||mn>=mx)return;const nd={...data,targetMin:mn,targetMax:mx};setData(nd);setSaved(true);setTimeout(()=>setSaved(false),1500);}
  function resetDopa(){if(!confirm('Reset to 5?'))return;setData({...data,dopamine:5});}
  function resetFlames(){if(!confirm('Reset flames?'))return;setData({...data,flames:0});}
  const inp={background:'#1a1a1a',border:'1px solid #252525',color:'#fff',padding:'13px 14px',fontSize:'15px',borderRadius:'12px',width:'82px'};
  return (
    <div style={{ padding:'28px 24px 120px' }}>
      <div style={{fontSize:'30px',fontWeight:'800',fontFamily:'Syne, sans-serif',marginBottom:'28px'}}>Settings</div>
      <div style={{background:'#111',borderRadius:'18px',padding:'20px',border:'1px solid #1c1c1c',marginBottom:'24px'}}>
  <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
    <div style={{display:'flex',gap:'12px',alignItems:'flex-start'}}>
      <span style={{fontSize:'13px',fontWeight:'800',color:'#555',fontFamily:'Syne, sans-serif',flexShrink:0}}>1.</span>
      <span style={{fontSize:'13px',color:'#aaa',lineHeight:'1.7'}}>Dopamine is your brain's reward signal — the lower it is, the more focused and driven you become.</span>
    </div>
    <div style={{height:'1px',background:'#1c1c1c'}}/>
    <div style={{display:'flex',gap:'12px',alignItems:'flex-start'}}>
      <span style={{fontSize:'13px',fontWeight:'800',color:'#555',fontFamily:'Syne, sans-serif',flexShrink:0}}>2.</span>
      <span style={{fontSize:'13px',color:'#aaa',lineHeight:'1.7'}}>This app helps you control your dopamine, to be more focused, mentally clear, and in general more successful.</span>
    </div>
  </div>
</div>
      <div style={{background:'#111',borderRadius:'18px',padding:'20px',border:'1px solid #1c1c1c',marginBottom:'14px'}}>
        <div style={{fontSize:'11px',color:'#555',letterSpacing:'0.15em',marginBottom:'14px',fontFamily:'Syne, sans-serif'}}>PROFILE</div>
        <div style={{display:'flex',gap:'20px',flexWrap:'wrap'}}>
          {[['Name',data.profile?.name],['Gender',data.profile?.gender],['Age',data.profile?.age+'y'],['Weight',data.profile?.weight+'kg']].map(([k,v])=>(
            <div key={k}><div style={{fontSize:'10px',color:'#555',marginBottom:'2px'}}>{k}</div><div style={{fontSize:'16px',fontWeight:'700',fontFamily:'Syne, sans-serif'}}>{v}</div></div>
          ))}
        </div>
      </div>
      <div style={{background:'#111',borderRadius:'18px',padding:'20px',border:'1px solid #1c1c1c',marginBottom:'14px'}}>
        <div style={{fontSize:'11px',color:'#555',letterSpacing:'0.15em',marginBottom:'14px',fontFamily:'Syne, sans-serif'}}>TARGET RANGE</div>
        <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
          <input value={minVal} onChange={e=>setMinVal(e.target.value)} type="number" style={inp}/>
          <span style={{color:'#555',fontSize:'18px'}}>—</span>
          <input value={maxVal} onChange={e=>setMaxVal(e.target.value)} type="number" style={inp}/>
          <button onClick={saveTarget} style={{flex:1,padding:'13px',background:'#fff',color:'#000',borderRadius:'12px',fontSize:'13px',fontWeight:'800',fontFamily:'Syne, sans-serif'}}>{saved?'✓':'SAVE'}</button>
        </div>
      </div>
    <div style={{background:'#111',borderRadius:'18px',padding:'20px',border:'1px solid #1c1c1c',marginBottom:'14px'}}>
  <div style={{fontSize:'11px',color:'#555',letterSpacing:'0.15em',marginBottom:'14px',fontFamily:'Syne, sans-serif'}}>ENTREPRENEUR MODE</div>
  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
    <span style={{fontSize:'13px',color:'#aaa'}}>Dopamine range 0–25</span>
    <button onClick={()=>setData({...data,entrepreneurMode:!data.entrepreneurMode})} style={{padding:'10px 20px',background:data.entrepreneurMode?'#fff':'#1a1a1a',color:data.entrepreneurMode?'#000':'#666',borderRadius:'12px',fontSize:'13px',fontWeight:'700',fontFamily:'Syne, sans-serif',border:'1px solid #252525'}}>
      {data.entrepreneurMode ? 'ON' : 'OFF'}
    </button>
  </div>
</div>
      <div style={{background:'#111',borderRadius:'18px',padding:'20px',border:'1px solid #1c1c1c',marginBottom:'14px'}}>
        <div style={{fontSize:'11px',color:'#555',letterSpacing:'0.15em',marginBottom:'14px',fontFamily:'Syne, sans-serif'}}>RESET</div>
        <div style={{display:'flex',gap:'10px'}}>
          <button onClick={resetDopa} style={{flex:1,padding:'13px',background:'#1a1a1a',color:'#ff4444',borderRadius:'12px',fontSize:'12px',fontWeight:'700',fontFamily:'Syne, sans-serif',border:'1px solid #252525'}}>DOPAMINE</button>
          <button onClick={resetFlames} style={{flex:1,padding:'13px',background:'#1a1a1a',color:'#ff4444',borderRadius:'12px',fontSize:'12px',fontWeight:'700',fontFamily:'Syne, sans-serif',border:'1px solid #252525'}}>FLAMES 🔥</button>
        </div>
      </div>
      <div style={{background:'#111',borderRadius:'18px',padding:'20px',border:'1px solid #1c1c1c',fontSize:'13px',color:'#555',lineHeight:'1.7'}}>
        <div style={{fontWeight:'700',color:'#777',marginBottom:'8px',fontFamily:'Syne, sans-serif',fontSize:'14px'}}>Dopa-AI v1.0</div>
        A symbolic self-control tracker. Not a medical tool. All data is stored locally on your device only. No cloud. No login.
      </div>
    </div>
  );
}
function Nav({ screen, setScreen }) {
  const tabs=[{id:'home',label:'HOME',icon:'◉'},{id:'calendar',label:'CAL',icon:'◫'},{id:'settings',label:'SET',icon:'⚙'}];
  return (
    <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:'430px',background:'rgba(10,10,10,0.96)',backdropFilter:'blur(20px)',borderTop:'1px solid #1a1a1a',display:'flex',zIndex:100,paddingBottom:'env(safe-area-inset-bottom)'}}>
      {tabs.map(({id,label,icon})=>{const active=screen===id;return<button key={id} onClick={()=>setScreen(id)} style={{flex:1,padding:'14px 0 10px',display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',color:active?'#fff':'#3a3a3a'}}><span style={{fontSize:'18px'}}>{icon}</span><span style={{fontSize:'9px',letterSpacing:'0.1em',fontFamily:'Syne, sans-serif',fontWeight:active?'700':'400'}}>{label}</span></button>;})}
    </div>
  );
}
function App() {
  const [data, setData] = useState(()=>hydrate());
  const [screen, setScreen] = useState('home');
  const [installPrompt, setInstallPrompt] = useState(null);
  const [showInstallScreen, setShowInstallScreen] = useState(false);

  useEffect(()=>{const h=e=>{e.preventDefault();setInstallPrompt(e);};window.addEventListener('beforeinstallprompt',h);return()=>window.removeEventListener('beforeinstallprompt',h);},[]);
  useEffect(()=>{const t=setInterval(()=>{const today=todayStr();setData(prev=>{if(!prev||prev.lastReset!==today){const nd=prev?{...prev,dopamine:DEFAULT_DOPA,lastReset:today}:null;if(nd)save(nd);return nd;}return prev;});},60000);return()=>clearInterval(t);},[]);

  const updateData=d=>{setData(d);save(d);};

  if(!data && !showInstallScreen) {
    return <Onboarding onDone={profile=>{
      const nd=initData(profile); save(nd); setData(nd);
      setShowInstallScreen(true);
    }}/>;
  }

  if(showInstallScreen) {
    return <InstallScreen
      installPrompt={installPrompt}
      onInstall={()=>setShowInstallScreen(false)}
      onSkip={()=>setShowInstallScreen(false)}
    />;
  }

  return (
    <div style={{background:'#0a0a0a',color:'#fff',minHeight:'100vh',maxWidth:'430px',margin:'0 auto',fontFamily:"'Inter',sans-serif"}}>
      {screen==='home'&&<HomeScreen data={data} setData={updateData} installPrompt={installPrompt} setInstallPrompt={setInstallPrompt}/>}
      {screen==='history'&&<HistoryScreen data={data}/>}
      {screen==='calendar'&&<CalendarScreen data={data}/>}
      {screen==='settings'&&<SettingsScreen data={data} setData={updateData}/>}
      <Nav screen={screen} setScreen={setScreen}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
